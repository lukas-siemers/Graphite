name: Build

# Disabled 2026-04-15 per user request — only ios.yml runs until further
# notice. Re-enable by restoring the push trigger:
#   on:
#     push:
#       branches:
#         - main
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_pattern: 'apps/desktop/release/*.dmg'
            artifact_name: graphite-macos
          - os: windows-latest
            artifact_pattern: 'apps/desktop/release/*.exe'
            artifact_name: graphite-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Configure git to use HTTPS instead of SSH for package fetches
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      # Rebuild better-sqlite3 native module against the target Electron version.
      # @electron/rebuild is installed as a devDependency in apps/desktop and
      # exposes the `electron-rebuild` CLI binary.
      - name: Rebuild native modules
        working-directory: apps/desktop
        run: yarn rebuild-native

      # Write Supabase env vars for the Expo web bundle.
      - name: Configure environment
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      # Export the Expo web bundle into apps/desktop/dist.
      # Must run from apps/mobile so that Metro / @expo/cli can resolve all
      # Expo and React Native packages that live in that workspace.
      - name: Export Expo web bundle
        working-directory: apps/mobile
        run: yarn expo export --platform web --output-dir ../desktop/dist

      # Compile the Electron main-process TypeScript (electron/ → dist/electron/).
      - name: Compile Electron TypeScript
        working-directory: apps/desktop
        run: yarn tsc --project tsconfig.json

      # Package with electron-builder.
      # CSC_IDENTITY_AUTO_DISCOVERY=false prevents macOS from attempting to
      # find a code-signing identity that is not present on CI runners.
      # USE_HARD_LINKS=false avoids DMG creation failures on GitHub-hosted
      # macOS runners whose temp directories do not support hard links.
      # GH_TOKEN is passed so electron-updater (a runtime dep) does not throw
      # on startup even though we publish nothing here (--publish never).
      - name: Package with electron-builder
        working-directory: apps/desktop
        run: yarn electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_HARD_LINKS: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error
          retention-days: 30
