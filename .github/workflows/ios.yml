name: iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (development = device testing, appstore = TestFlight)'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - appstore

jobs:
  build:
    name: Build iOS (${{ inputs.profile || 'appstore' }})
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      BUILD_PROFILE: ${{ inputs.profile || 'appstore' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      # Pin Xcode to 16.4 — matches the last known working build (build 1,
      # commit ec39cc1). Xcode 26.x ships iOS 26 SDK which breaks RN 0.81.5
      # due to API changes. DO NOT upgrade without testing the full crash/
      # black-screen lifecycle on a real device first.
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Install Apple certificate and provisioning profile from GitHub Secrets.
      # See README section "iOS Build Setup" for how to create these secrets.
      - name: Install Apple signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile and extract its UUID
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # Write Supabase env vars so Expo inlines them at build time.
      - name: Configure environment
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      # Generate the native ios/ directory from the Expo project.
      - name: Expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --clean

      # Verify the TurboModule fix was injected into AppDelegate by the Expo plugin.
      - name: Verify TurboModule fix in AppDelegate
        run: |
          DELEGATE=$(find apps/mobile/ios -name 'AppDelegate.*' -type f | head -1)
          echo "Found AppDelegate at: $DELEGATE"
          if [ -z "$DELEGATE" ]; then echo "FATAL: No AppDelegate found"; find apps/mobile/ios -type f | head -30; exit 1; fi
          grep -q 'RCTEnableTurboModuleSyncVoidMethods' "$DELEGATE" || { echo "FATAL: TurboModule fix not in AppDelegate:"; cat "$DELEGATE"; exit 1; }
          echo "TurboModule fix verified in AppDelegate ✔"

      # Install CocoaPods dependencies.
      - name: Pod install
        working-directory: apps/mobile/ios
        run: pod install

      # Build the app with xcodebuild.
      # For development: build an unsigned .app for Simulator or ad-hoc .ipa.
      # For appstore: build a signed .ipa for TestFlight upload.
      - name: Build with xcodebuild
        working-directory: apps/mobile/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Ensure EXPO_PUBLIC vars are available during the Metro bundling phase
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          SCHEME="Graphite"
          WORKSPACE="Graphite.xcworkspace"
          if [ "${{ env.BUILD_PROFILE }}" = "appstore" ]; then
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -archivePath "$RUNNER_TEMP/Graphite.xcarchive" -sdk iphoneos archive CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" PROVISIONING_PROFILE="$PROFILE_UUID" 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"
            echo "--- Last 100 lines of build log ---"
            tail -100 "$RUNNER_TEMP/xcodebuild.log"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>method</key>\n<string>app-store</string>\n<key>teamID</key>\n<string>%s</string>\n<key>signingStyle</key>\n<string>manual</string>\n<key>provisioningProfiles</key>\n<dict>\n<key>com.graphite.app</key>\n<string>%s</string>\n</dict>\n</dict>\n</plist>' "$APPLE_TEAM_ID" "$PROFILE_UUID" > "$RUNNER_TEMP/ExportOptions.plist"
            xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/Graphite.xcarchive" -exportPath "$RUNNER_TEMP/export" -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          else
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' build CODE_SIGNING_ALLOWED=NO | tail -50
          fi

      # Verify the JS bundle is present in the archive.
      - name: Verify JS bundle in archive
        if: env.BUILD_PROFILE == 'appstore'
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/Graphite.xcarchive/Products/Applications" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then echo "FATAL: No .app found in archive"; exit 1; fi
          # Hermes produces .hbc (bytecode), JSC produces main.jsbundle
          if ls "$APP_PATH"/main.jsbundle "$APP_PATH"/main.jsbundle.hbc 2>/dev/null | head -1; then
            echo "JS bundle verified in archive"
          else
            echo "FATAL: No JS bundle (main.jsbundle or .hbc) found in archive"
            ls -la "$APP_PATH/"
            exit 1
          fi

      # Upload TestFlight build (appstore profile only).
      - name: Upload to TestFlight
        if: env.BUILD_PROFILE == 'appstore'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/Graphite.ipa \
            -u "$APPLE_ID" \
            -p "$APPLE_APP_SPECIFIC_PASSWORD" \
            -t ios

      # Upload artifacts for download.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphite-ios-${{ env.BUILD_PROFILE }}
          path: |
            ${{ runner.temp }}/export/*.ipa
            ${{ runner.temp }}/Graphite.xcarchive
          if-no-files-found: warn
          retention-days: 30

      # Cleanup keychain
      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
