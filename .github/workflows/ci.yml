name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Recompile better-sqlite3 against the system Node version used by Vitest.
      # electron-rebuild targets Electron's bundled Node ABI, which differs from
      # the system Node ABI — tests run under the system Node, so a plain
      # npm rebuild is required here (not electron-rebuild).
      - name: Rebuild native modules for Node
        run: npm rebuild better-sqlite3
        working-directory: .

      - name: Run Vitest
        run: yarn test

      # Build 92 guardrail: the native editor asset at
      # apps/mobile/assets/editor/editor.html MUST match what
      # bundle-cm6.mjs produces from current source. If a PR changes
      # native-editor-bridge.ts, native-editor-bootstrap.ts, editorHtml.ts,
      # or the CM6 bundle without regenerating editor.html, the shipped
      # asset goes stale and TestFlight ships the previous editor.
      # Regenerate and diff — any uncommitted change fails CI.
      - name: Regenerate native editor asset
        run: yarn --cwd packages/editor bundle-cm6

      - name: Fail if editor.html is stale
        run: |
          if ! git diff --exit-code apps/mobile/assets/editor/editor.html; then
            echo "::error::apps/mobile/assets/editor/editor.html is stale. Run 'yarn --cwd packages/editor bundle-cm6' locally and commit the regenerated file."
            exit 1
          fi
          if ! git diff --exit-code packages/editor/src/live-preview/cm6-bundle.generated.js packages/editor/src/live-preview/editor-runtime-string.generated.ts; then
            echo "::error::Generated CM6 bundle files are stale. Run 'yarn --cwd packages/editor bundle-cm6' locally and commit the regenerated files."
            exit 1
          fi
