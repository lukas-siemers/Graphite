<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Graphite Minimal Probe</title>
<style>
  html, body { margin: 0; padding: 0; background: #1E1E1E; color: #DCDDDE; font-family: -apple-system, sans-serif; }
  body { padding: 24px; font-size: 18px; }
  #status { color: #F28500; margin-top: 12px; font-size: 14px; }
  #target { margin-top: 16px; padding: 16px; background: #2C2C2C; border: 1px solid #333; cursor: pointer; user-select: none; }
</style>
</head>
<body>
<h1>Native Editor Probe</h1>
<div id="status">initial</div>
<div id="target">Tap me to send a click event</div>

<script>
(function () {
  function post(msg) {
    try {
      if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
        window.ReactNativeWebView.postMessage(
          typeof msg === 'string' ? msg : JSON.stringify(msg)
        );
      }
    } catch (_) {}
  }

  // Phase 1 — script parsed + executing
  post({ type: 'phase', phase: 1, label: 'minimal-boot' });

  var status = document.getElementById('status');
  if (status) status.textContent = 'script ran; waiting for tap';

  // Phase 2 — DOM accessible, handlers attaching
  post({ type: 'phase', phase: 2, label: 'dom-wired' });

  var target = document.getElementById('target');
  if (target) {
    target.addEventListener('click', function () {
      if (status) status.textContent = 'tapped';
      post({ type: 'tap' });
    });
  }

  // Phase 3 — fully booted, send the ready handshake so the 2.5s watchdog
  // doesn't swap us out for the TextInput fallback.
  post({ type: 'phase', phase: 3, label: 'ready' });
  post({ type: 'ready' });
})();
</script>
</body>
</html>
